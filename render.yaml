services:
  - type: web
    name: pm-dashboard
    runtime: python
    plan: standard
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: API_TENNIS_KEY
        sync: false
